version: "3.8"

services:
  orchestrator:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - config/.env
    depends_on:
      - mock-crm
      - mock-tickets

  mock-crm:
    build: .
    command: uvicorn services.mock_crm.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"

  mock-tickets:
    build: .
    command: uvicorn services.mock_tickets.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
